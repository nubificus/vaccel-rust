name: Build and Upload

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-dist:
    name: Build and Upload
    uses: nubificus/vaccel/.github/workflows/verify-build.yml@main
    with:
      release: true
      runner: '["base", "dind", "2204"]'
      package: 'rust'
      options: 'rpc-client=enabled,rpc-agent=enabled'
      upload-subpath: 'rust'
    secrets: inherit

  update-release:
    needs: build-dist
    name: Update Release
    if: always()
    uses: nubificus/vaccel/.github/workflows/update-release.yml@main
    with:
      artifacts-path: 'rust'
      result: ${{ needs.build-dist.result }}
    secrets: inherit
